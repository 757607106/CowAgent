services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${PLATFORM_POSTGRES_USER:-cowplatform}
      POSTGRES_PASSWORD: ${PLATFORM_POSTGRES_PASSWORD:-cowplatform}
      POSTGRES_DB: ${PLATFORM_POSTGRES_DB:-cowplatform}
    ports:
      - "${PLATFORM_POSTGRES_PORT:-55432}:5432"
    volumes:
      - platform-postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${PLATFORM_POSTGRES_USER:-cowplatform} -d ${PLATFORM_POSTGRES_DB:-cowplatform}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${PLATFORM_REDIS_PORT:-56379}:6379"
    volumes:
      - platform-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.13.4
    ports:
      - "${PLATFORM_QDRANT_HTTP_PORT:-56333}:6333"
      - "${PLATFORM_QDRANT_GRPC_PORT:-56334}:6334"
    volumes:
      - platform-qdrant:/qdrant/storage

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${PLATFORM_MINIO_ROOT_USER:-cowplatform}
      MINIO_ROOT_PASSWORD: ${PLATFORM_MINIO_ROOT_PASSWORD:-cowplatform123}
    ports:
      - "${PLATFORM_MINIO_API_PORT:-59000}:9000"
      - "${PLATFORM_MINIO_CONSOLE_PORT:-59001}:9001"
    volumes:
      - platform-minio:/data

volumes:
  platform-postgres:
  platform-redis:
  platform-qdrant:
  platform-minio:
