x-platform-environment: &platform-environment
  COW_PLATFORM_ENV: ${COW_PLATFORM_ENV:-dev}
  COW_PLATFORM_REQUIRE_DEPENDENCIES: ${COW_PLATFORM_REQUIRE_DEPENDENCIES:-true}
  COW_PLATFORM_STRICT_STARTUP: ${COW_PLATFORM_STRICT_STARTUP:-true}
  COW_PLATFORM_DEPENDENCY_WAIT_SECONDS: ${COW_PLATFORM_DEPENDENCY_WAIT_SECONDS:-90}
  COW_PLATFORM_MIGRATE_ON_START: ${COW_PLATFORM_MIGRATE_ON_START:-true}
  COW_PLATFORM_DATABASE_URL: postgresql://${PLATFORM_POSTGRES_USER:-cowplatform}:${PLATFORM_POSTGRES_PASSWORD:-cowplatform}@postgres:5432/${PLATFORM_POSTGRES_DB:-cowplatform}
  COW_PLATFORM_REDIS_URL: redis://redis:6379/0
  COW_PLATFORM_QDRANT_URL: http://qdrant:6333
  COW_PLATFORM_MINIO_ENDPOINT: http://minio:9000
  COW_PLATFORM_MINIO_ACCESS_KEY: ${PLATFORM_MINIO_ROOT_USER:-cowplatform}
  COW_PLATFORM_MINIO_SECRET_KEY: ${PLATFORM_MINIO_ROOT_PASSWORD:-cowplatform123}
  COW_PLATFORM_MINIO_BUCKET: ${PLATFORM_MINIO_BUCKET:-cowagent}
  AGENT_WORKSPACE: /home/agent/cow
  APPDATA_DIR: /home/agent/cow/appdata
  MODEL: ${MODEL:-qwen3.6-plus}

services:
  platform-app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.latest
      args:
        INSTALL_BROWSER: "false"
    command: python -m cow_platform.api.main --host 0.0.0.0 --port 9900
    environment:
      <<: *platform-environment
      COW_PLATFORM_HOST: 0.0.0.0
      COW_PLATFORM_PORT: 9900
    ports:
      - "${COW_PLATFORM_PORT:-9900}:9900"
    volumes:
      - ../cow:/home/agent/cow
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import json, urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:9900/ready', timeout=5)); raise SystemExit(0 if data.get('status') == 'ready' else 1)\"",
        ]
      interval: 10s
      timeout: 8s
      retries: 12
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_started

  platform-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.latest
      args:
        INSTALL_BROWSER: "false"
    command: python -m cow_platform.worker.main --poll-interval 1
    environment:
      <<: *platform-environment
    volumes:
      - ../cow:/home/agent/cow
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_started

  platform-web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.latest
      args:
        INSTALL_BROWSER: "false"
    command: python app.py
    environment:
      <<: *platform-environment
      CHANNEL_TYPE: web
      WEB_PORT: 9899
      WEB_TENANT_AUTH: "true"
    ports:
      - "${WEB_PORT:-9899}:9899"
    volumes:
      - ../cow:/home/agent/cow
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:9899/auth/check', timeout=5).read()\"",
        ]
      interval: 10s
      timeout: 8s
      retries: 12
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_started
